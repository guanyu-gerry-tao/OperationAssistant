name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run backend tests
        run: python -m pytest tests/backend -q
      - name: Run eval quality smoke
        run: |
          python scripts/eval_all.py --arm baseline --limit 12 --output-dir evals/tmp/ci-baseline --check-thresholds
          python scripts/eval_all.py --arm improved --limit 12 --output-dir evals/tmp/ci-improved --check-thresholds

  backend-dependencies:
    name: Backend dependency smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: operation_assistant
          POSTGRES_USER: operation_assistant
          POSTGRES_PASSWORD: operation_assistant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U operation_assistant -d operation_assistant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run dependency smoke tests
        env:
          OA_DATABASE_URL: postgresql://operation_assistant:operation_assistant@127.0.0.1:5432/operation_assistant
          OA_REDIS_URL: redis://127.0.0.1:6379/0
        run: python -m pytest tests/backend/test_dependency_smoke.py -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run frontend tests
        run: npm test
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
